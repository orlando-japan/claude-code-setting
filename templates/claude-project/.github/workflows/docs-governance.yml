name: Docs Governance

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'
      - 'doc/**'
  push:
    branches: [main, master]
    paths:
      - '**/*.md'
      - 'docs/**'
      - 'doc/**'

jobs:
  docs-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed markdown files
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1
            files=$(git diff --name-only "$base"...HEAD -- '*.md' 'docs/**' 'doc/**' || true)
          else
            before="${{ github.event.before }}"
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              files=$(git diff --name-only "$before"...HEAD -- '*.md' 'docs/**' 'doc/**' || true)
            else
              files=$(git ls-files '*.md' 'docs/**' 'doc/**' || true)
            fi
          fi
          {
            echo 'files<<EOF'
            printf '%s\n' "$files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Warn on fragmentation patterns
        shell: bash
        run: |
          set -euo pipefail
          files='${{ steps.changes.outputs.files }}'
          if [[ -z "$files" ]]; then
            echo 'No markdown governance targets changed.'
            exit 0
          fi
          echo "Changed docs:"
          printf '%s\n' "$files"
          printf '%s\n' "$files" | grep -Eiq '(summary|quick-reference|checklist|handoff|legacy|patch|delta|rereview|v[0-9]+).*\.md$' \
            && echo '::warning::Possible document fragmentation pattern detected. Review with doc-defrag-audit.'
          printf '%s\n' "$files" | grep -Eiq 'README\.md|docs?/.*\.md|.*(PRD|SDD).*\.md$' \
            && echo '::warning::Docs changed. Consider running governance-link-drift-audit on README, whitelist, skills, and runtime entrypoints.'
